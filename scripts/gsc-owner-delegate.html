<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GSC Owner Delegate</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow: auto; max-height: 400px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>GSC 소유자 위임 도구</h1>
  <p>이 도구는 yeosonam.official@gmail.com 계정의 OAuth 토큰으로<br>
  Site Verification API를 호출하여 서비스 계정을 GSC 소유자로 추가합니다.</p>
  
  <div id="status">준비됨</div>
  
  <button id="authBtn" onclick="authenticate()">1. Google 로그인</button>
  <button id="execBtn" onclick="execute()" disabled>2. 소유자 추가 실행</button>
  
  <h3>로그</h3>
  <pre id="log">[대기 중]</pre>

  <script>
    const CLIENT_ID = '778786828639044-7jj5lnm4mk0jfa12he86mgdsoef6h54s.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/siteverification';
    const SERVICE_ACCOUNT_EMAIL = 'yeosonam-os-bot@gen-lang-client-0264824193.iam.gserviceaccount.com';
    const SITE_URL = 'https://yeosonam.com/';

    let token = null;
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const authBtn = document.getElementById('authBtn');
    const execBtn = document.getElementById('execBtn');

    function log(msg) {
      logEl.textContent += '\n' + new Date().toLocaleTimeString() + ' ' + msg;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function authenticate() {
      log('인증 시작...');
      statusEl.textContent = '인증 중...';
      
      const client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (response) => {
          if (response.error) {
            log('❌ 인증 오류: ' + response.error);
            statusEl.textContent = '인증 실패';
            return;
          }
          token = response.access_token;
          log('✅ 인증 성공! 토큰: ' + token.slice(0, 20) + '...');
          statusEl.textContent = '인증 완료';
          execBtn.disabled = false;
          authBtn.textContent = '✅ 로그인됨';
          authBtn.disabled = true;
        },
      });
      client.requestAccessToken();
    }

    async function execute() {
      if (!token) {
        log('❌ 먼저 로그인하세요.');
        return;
      }

      statusEl.textContent = '실행 중...';
      log('=== 소유자 추가 시작 ===');

      try {
        // 1. 현재 인증된 사이트 목록 조회
        log('1. 인증된 사이트 목록 조회 중...');
        const listResp = await fetch('https://www.googleapis.com/siteVerification/v1/webResource', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const listData = await listResp.json();
        
        if (!listResp.ok) {
          throw new Error('목록 조회 실패: ' + JSON.stringify(listData));
        }

        const sites = listData.items || [];
        log('   총 ' + sites.length + '개 사이트 인증됨');
        sites.forEach(s => log('   - ' + s.site.identifier));

        // 2. 대상 사이트 찾기
        const targetSite = sites.find(s => s.site.identifier === SITE_URL);
        if (!targetSite) {
          log('⚠️ ' + SITE_URL + '을 찾을 수 없습니다.');
          log('   도메인 속성 검색 중...');
          const domainSite = sites.find(s => s.site.identifier === 'yeosonam.com' || s.id.includes('yeosonam.com'));
          if (!domainSite) {
            throw new Error('일치하는 사이트 없음');
          }
          log('   찾음: ' + domainSite.site.identifier);
          
          // 3. update로 소유자 추가
          const currentOwners = domainSite.owners || [];
          log('2. 현재 소유자: ' + currentOwners.join(', '));
          
          if (currentOwners.includes(SERVICE_ACCOUNT_EMAIL)) {
            log('✅ 이미 소유자입니다!');
            statusEl.textContent = '이미 소유자 등록됨';
            return;
          }

          log('3. "' + SERVICE_ACCOUNT_EMAIL + '" 추가 중...');
          const updateResp = await fetch(
            'https://www.googleapis.com/siteVerification/v1/webResource/' + encodeURIComponent(domainSite.id),
            {
              method: 'PUT',
              headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                owners: [...currentOwners, SERVICE_ACCOUNT_EMAIL]
              })
            }
          );
          const updateData = await updateResp.json();
          if (!updateResp.ok) throw new Error('업데이트 실패: ' + JSON.stringify(updateData));
          
          log('✅ 성공! 업데이트된 소유자: ' + (updateData.owners || []).join(', '));
          statusEl.textContent = '✅ 소유자 추가 성공!';
          return;
        }

        // URL 속성인 경우
        const currentOwners = targetSite.owners || [];
        log('2. 현재 소유자: ' + currentOwners.join(', '));
        
        if (currentOwners.includes(SERVICE_ACCOUNT_EMAIL)) {
          log('✅ 이미 소유자입니다!');
          statusEl.textContent = '이미 소유자 등록됨';
          return;
        }

        log('3. "' + SERVICE_ACCOUNT_EMAIL + '" 추가 중...');
        const updateResp = await fetch(
          'https://www.googleapis.com/siteVerification/v1/webResource/' + encodeURIComponent(targetSite.id),
          {
            method: 'PUT',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              owners: [...currentOwners, SERVICE_ACCOUNT_EMAIL]
            })
          }
        );
        const updateData = await updateResp.json();
        if (!updateResp.ok) throw new Error('업데이트 실패: ' + JSON.stringify(updateData));
        
        log('✅ 성공! 업데이트된 소유자: ' + (updateData.owners || []).join(', '));
        statusEl.textContent = '✅ 소유자 추가 성공!';
        
      } catch (err) {
        log('❌ 오류: ' + err.message);
        statusEl.textContent = '오류 발생';
        if (err.response) {
          const body = await err.response.text().catch(() => '');
          log('   상세: ' + body.slice(0, 500));
        }
      }
    }
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
