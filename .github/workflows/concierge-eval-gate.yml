name: Concierge Eval Gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run Concierge Eval
        env:
          CONCIERGE_EVAL_THRESHOLD: '0.95'
        run: npm run eval:concierge
