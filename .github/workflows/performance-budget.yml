name: Performance Budget Enforcement

on:
  workflow_dispatch:

jobs:
  performance-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
          SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
          NEXT_PUBLIC_BASE_URL: 'https://example.com'

      - name: Collect Core Web Vitals metrics
        id: vitals
        run: node scripts/collect-vitals.js
        env:
          CORE_WEB_VITALS_JSON: ${{ vars.CORE_WEB_VITALS_JSON }}

      - name: Check bundle size budget
        id: bundle
        run: node scripts/check-bundle.js

      - name: Analyze API response times
        id: api
        run: node scripts/analyze-api-perf.js
        env:
          API_PERF_JSON: ${{ vars.API_PERF_JSON }}

      - name: Database query performance check
        id: db
        run: node scripts/check-db-perf.js
        env:
          DB_PERF_JSON: ${{ vars.DB_PERF_JSON }}

      - name: Track performance trends
        if: always()
        run: node scripts/track-trends.js

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-budget-results
          path: |
            vitals-result.json
            bundle-result.json
            api-perf-result.json
            db-perf-result.json
            perf-trend-report.json
            .perf-history.jsonl
          retention-days: 30
