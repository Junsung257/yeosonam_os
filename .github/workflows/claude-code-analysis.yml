name: Claude Code Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        id: tsc
        continue-on-error: true
        run: |
          npx tsc --noEmit 2>&1 | tee tsc-output.txt || true
          ERRORS=$(grep -c "error TS" tsc-output.txt || echo "0")
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT

      - name: ESLint analysis
        id: eslint
        continue-on-error: true
        run: |
          npx eslint src --format=json --output-file eslint-report.json || true
          if [ -f eslint-report.json ]; then
            VIOLATIONS=$(jq 'length' eslint-report.json 2>/dev/null || echo "0")
            echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
          fi

      - name: Security scan (Trivy)
        id: trivy
        continue-on-error: true
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/root/scan \
            aquasec/trivy:latest fs /root/scan \
            --severity CRITICAL,HIGH \
            --format json \
            --output /root/scan/trivy-report.json || true
          if [ -f trivy-report.json ]; then
            VULNS=$(jq '.Results | length' trivy-report.json 2>/dev/null || echo "0")
            echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
          fi

      - name: Post analysis comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const tscErrors = "${{ steps.tsc.outputs.errors }}" || "0";
            const eslintViolations = "${{ steps.eslint.outputs.violations }}" || "0";
            const trivyVulns = "${{ steps.trivy.outputs.vulnerabilities }}" || "0";

            const comment = `## 🔍 Claude Code Analysis

            ### TypeScript Type Check
            \`\`\`
            ${tscErrors} type errors found
            \`\`\`

            ### ESLint
            \`\`\`
            ${eslintViolations} violations found
            \`\`\`

            ### Security Scan
            \`\`\`
            ${trivyVulns} vulnerabilities found (CRITICAL/HIGH)
            \`\`\`

            ${tscErrors == "0" && eslintViolations == "0" && trivyVulns == "0" ? "✅ All checks passed!" : "⚠️ Review required"}`;

            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: comment,
              event: 'COMMENT'
            });
