name: Visual Regression

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'production 기준으로 모든 baseline을 재생성하고 자동 커밋'
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - 'src/app/packages/**'
      - 'src/components/admin/YeosonamA4Template.tsx'
      - 'src/lib/itinerary-render.ts'
      - 'src/lib/attraction-matcher.ts'
      - 'tests/visual/**'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run visual regression (against production)
        id: visual
        env:
          VISUAL_TEST_URL: ${{ secrets.PRODUCTION_URL || 'https://yeosonam.com' }}
          UPDATE_BASELINE: ${{ inputs.update_baseline && '1' || '' }}
        run: |
          if [ "$UPDATE_BASELINE" = "1" ]; then
            echo "🔄 Baseline 전체 재생성 모드 (--update-snapshots)"
            npx playwright test tests/visual --update-snapshots
          else
            npm run test:visual
          fi
        timeout-minutes: 15
        continue-on-error: true

      - name: Commit updated baselines
        if: inputs.update_baseline && steps.visual.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual/
          if git diff --cached --quiet; then
            echo "ℹ️ baseline 변경사항 없음"
          else
            git commit -m "test: regenerate visual baselines from production (automated)"
            git push
            echo "✅ 새 baseline 커밋 완료"
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload snapshot diffs (실패 시)
        if: steps.visual.outcome == 'failure' && !inputs.update_baseline
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Create issue on failure
        if: steps.visual.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Visual Regression] ${new Date().toISOString().slice(0,10)} — 렌더링 변경 탐지`;
            const body = `
            ## 🚨 Visual Regression 실패

            **스케줄 실행**: ${new Date().toISOString()}
            **URL**: ${process.env.VISUAL_TEST_URL || 'https://yeosonam.com'}

            ### 확인 방법
            1. Actions 탭 → 이 실행 → artifacts 다운로드 (snapshot-diffs-*.zip)
            2. 의도된 변경이면: Visual Regression workflow → Run workflow → update_baseline 체크
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['visual-regression', 'automated']
            });
