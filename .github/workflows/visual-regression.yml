name: Visual Regression

on:
  schedule:
    # 매일 한국 시간 새벽 3시 (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 실행 가능
  push:
    branches: [main, master]
    paths:
      - 'src/app/packages/**'
      - 'src/components/admin/YeosonamA4Template.tsx'
      - 'src/lib/itinerary-render.ts'
      - 'src/lib/attraction-matcher.ts'
      - 'tests/visual/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run visual regression (against production)
        id: visual
        env:
          VISUAL_TEST_URL: ${{ secrets.PRODUCTION_URL || 'https://yeosonam.com' }}
        run: npm run test:visual
        timeout-minutes: 15
        continue-on-error: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload snapshot diffs (실패 시)
        if: steps.visual.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Create issue on failure
        if: steps.visual.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Visual Regression] ${new Date().toISOString().slice(0,10)} — 렌더링 변경 탐지`;
            const body = `
            ## 🚨 Visual Regression 실패

            **스케줄 실행**: ${new Date().toISOString()}
            **URL**: ${process.env.VISUAL_TEST_URL || 'https://yeosonam.com'}

            ### 확인 방법
            1. Actions 탭 → 이 실행 → artifacts 다운로드 (snapshot-diffs-*.zip)
            2. HTML 리포트 확인: \`npx playwright show-report\`
            3. 의도된 변경이면: \`npm run test:visual:update\` → 새 baseline 커밋

            ### 의심 커밋
            ${context.sha ? `${context.sha.slice(0, 7)}` : '(없음)'}
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['visual-regression', 'automated']
            });
