name: Semantic Release

on:
  push:
    branches: [main, develop]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        run: |
          semantic-release \
            --ci \
            --branches main,develop \
            2>&1 | tee release.log

          if grep -q "published version" release.log; then
            VERSION=$(grep -oP 'published version \K[0-9.]+' release.log | head -1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify release
        # 2026-05-15 mail-flood-stop v4: SLACK_WEBHOOK secret 미설정 시 skip (시각 노이즈 제거)
        if: steps.release.outputs.published == 'true' && env.SLACK_WEBHOOK != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK }}
          payload: |
            {
              "channel": "#releases",
              "username": "Release Bot",
              "icon_emoji": ":rocket:",
              "text": "🚀 New release: v${{ steps.release.outputs.version }}",
              "attachments": [
                {
                  "color": "#36a64f",
                  "title": "Release v${{ steps.release.outputs.version }}",
                  "text": "Automatically released by semantic-release",
                  "fields": [
                    {
                      "title": "Branch",
                      "value": "${{ github.ref_name }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    {
                      "title": "Release Page",
                      "value": "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.release.outputs.version }}",
                      "short": false
                    }
                  ]
                }
              ]
            }

      - name: Trigger deployment
        if: steps.release.outputs.published == 'true' && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Release published: v${{ steps.release.outputs.version }}"
          echo "📦 Ready for deployment"
          # Vercel deployment will be triggered automatically via webhook or
          # manually trigger with: gh deployment create
