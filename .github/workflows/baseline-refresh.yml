name: Baseline Refresh (Option B)

on:
  schedule:
    # 2시간마다 baseline 큐 처리 (승인된 상품 자동 반영)
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: baseline-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Process baseline queue
        id: refresh
        timeout-minutes: 35
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: ${{ secrets.PRODUCTION_URL || 'https://yeosonam.com' }}
          VISUAL_TEST_URL: ${{ secrets.PRODUCTION_URL || 'https://yeosonam.com' }}
        run: |
          # .env.local 임시 생성 (refresh-baselines.js가 읽음)
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF
          node scripts/refresh-baselines.js

      - name: Commit updated baselines
        if: steps.refresh.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="automation/visual-baselines-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add tests/visual/ || true
          if git diff --cached --quiet; then
            echo "ℹ️  변경사항 없음"
          else
            git commit -m "test: refresh visual baselines (automated) [vercel skip]"
            git push --set-upstream origin "$BRANCH"
            PR_TITLE="test: refresh visual baselines (automated) [vercel skip]"
            PR_BODY="Automated visual baseline refresh from Baseline Refresh (Option B), run ${{ github.run_id }}."
            if gh pr create --base main --head "$BRANCH" --title "$PR_TITLE" --body "$PR_BODY"; then
              echo "Baseline refresh PR created for $BRANCH."
            else
              echo "::warning::Baseline branch was pushed, but GitHub Actions is not allowed to create pull requests in this repository."
              echo "::warning::Create it manually with: gh pr create --base main --head $BRANCH --title \"$PR_TITLE\""
            fi
          fi
