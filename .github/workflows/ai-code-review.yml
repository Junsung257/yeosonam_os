name: AI Code Review & Insights

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'tests/**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Analyze changed files
        id: analyze
        run: node scripts/analyze-changes.js

      - name: Check best practices
        id: practices
        run: node scripts/check-practices.js

      - name: Generate code review summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const analysis = JSON.parse(fs.readFileSync('analysis-result.json', 'utf8'));
            const practices = JSON.parse(fs.readFileSync('practices-result.json', 'utf8'));

            let comment = '## AI Code Review\n\n';
            comment += '### Change Summary\n';
            comment += `- Files changed: ${analysis.filesChanged}\n`;
            const totalAdditions = Object.values(analysis.files).reduce((sum, file) => sum + file.additions, 0);
            const totalDeletions = Object.values(analysis.files).reduce((sum, file) => sum + file.deletions, 0);
            comment += `- Lines added: +${totalAdditions}\n`;
            comment += `- Lines removed: -${totalDeletions}\n\n`;

            comment += '### File Breakdown\n';
            comment += '| File | Additions | Deletions | Type |\n';
            comment += '| --- | ---: | ---: | --- |\n';
            Object.entries(analysis.files).slice(0, 10).forEach(([file, stats]) => {
              const type = stats.isTest ? 'Test' : stats.isComponent ? 'Component' : stats.isLib ? 'Lib' : 'Other';
              comment += `| ${file} | +${stats.additions} | -${stats.deletions} | ${type} |\n`;
            });

            const patterns = analysis.patterns || {};
            const patternLabels = {
              complexityIncrease: 'Complexity increase',
              potentialBugs: 'Potential issues',
              performanceIssues: 'Performance',
              securityConcerns: 'Security',
              testingGaps: 'Testing gaps',
            };
            const hasPatterns = Object.values(patterns).some((items) => Array.isArray(items) && items.length > 0);
            if (hasPatterns) {
              comment += '\n### Detected Patterns\n';
              for (const [key, label] of Object.entries(patternLabels)) {
                const items = patterns[key] || [];
                if (!items.length) continue;
                comment += `\n**${label}** (${items.length})\n`;
                items.forEach((file) => {
                  comment += `- ${file}\n`;
                });
              }
            }

            comment += '\n### Best Practices\n';
            comment += `- Tests included: ${practices.hasTests}\n`;
            comment += `- Documentation provided: ${practices.hasDocumentation}\n`;
            comment += `- Type-safe configuration: ${practices.hasTypeDefinitions}\n`;
            comment += `- Error handling touched: ${practices.hasErrorHandling}\n`;
            comment += `- Conventional commits used: ${practices.followsConventions}\n`;
            if (practices.issues?.length) {
              comment += '\n### Review Signals\n';
              practices.issues.forEach((issue) => {
                comment += `- ${issue}\n`;
              });
            }

            comment += '\n---\nGenerated by repository automation.';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });

      - name: Request review if issues detected
        if: github.event_name == 'pull_request'
        run: node scripts/check-review-needed.js

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-review-analysis
          path: |
            analysis-result.json
            practices-result.json
            review-needed.json
          retention-days: 30
