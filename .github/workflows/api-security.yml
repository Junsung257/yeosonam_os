name: API Security Scan

# 2026-05-13 — mail-flood-stop v2: 항상 fail로 메일 노이즈만 발생. 수동만 유지.
on:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run API security scan
        id: scan
        continue-on-error: true
        run: node scripts/scan-api-security.js

      - name: OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'yeosonam_os'
          path: '.'
          format: 'JSON'
          args: >
            --scan src/app/api
            --exclude node_modules
            --enableExperimental

      - name: Post security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const scanResult = "${{ steps.scan.outcome }}";

            let comment = `## 🔐 API Security Scan\n\n`;

            if (scanResult === 'success') {
              comment += `✅ No critical security issues found`;
            } else {
              comment += `❌ Security issues detected\n`;
              comment += `Check "Run API security scan" step for details`;
            }

            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: comment,
              event: 'COMMENT'
            });

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-security-report
          path: dependency-check-report.json
          retention-days: 30

      - name: Fail on critical issues
        if: steps.scan.outcome == 'failure'
        run: exit 1
