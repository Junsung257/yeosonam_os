name: Bundle Size Monitor

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
          SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
          NEXT_PUBLIC_BASE_URL: 'https://example.com'

      - name: Bundle budget
        run: npm run check:bundle:ci

      - name: Analyze bundle size
        id: bundle
        run: |
          CURRENT_SIZE=$(du -sh .next/ | cut -f1)
          CURRENT_BYTES=$(du -sb .next/ | cut -f1)
          echo "current=$CURRENT_SIZE" >> "$GITHUB_OUTPUT"

          if [ -f .bundlemonrc ]; then
            BASELINE=$(grep -oP '"size":\s*\K[0-9]+' .bundlemonrc || echo "0")
            THRESHOLD=$((BASELINE + 50000))

            if [ "$CURRENT_BYTES" -gt "$THRESHOLD" ]; then
              echo "warning=true" >> "$GITHUB_OUTPUT"
              echo "increase=$((CURRENT_BYTES - BASELINE)) bytes" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Post bundle results
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const currentSize = "${{ steps.bundle.outputs.current }}" || "Unknown";
            const warning = "${{ steps.bundle.outputs.warning }}" === "true" ? "Warning" : "OK";
            const increase = "${{ steps.bundle.outputs.increase }}" || "";

            let body = `## Bundle Size Report (${warning})\n\n`;
            body += `Current size: ${currentSize}\n`;
            if (increase) {
              body += `Increase: ${increase} (above 50KB threshold)\n`;
            } else {
              body += "Bundle size within acceptable range\n";
            }
            body += "\n**Recommendation:** Monitor bundle growth in each PR.";

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body,
              event: "COMMENT",
            });

      - name: Save current baseline
        if: github.ref == 'refs/heads/main'
        run: |
          echo "{\"size\": $(du -sb .next/ | cut -f1)}" > .bundlemonrc
          git add .bundlemonrc
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -m "ci: update bundle size baseline" || true
          git push || true
