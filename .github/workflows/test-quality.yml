name: Test Quality & Visual Regression

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/test-quality.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run visual regression tests
        id: test
        continue-on-error: true
        run: npm run test:visual
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
          SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
          NEXT_PUBLIC_BASE_URL: 'https://example.com'

      - name: Build for testing
        if: always()
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
          SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
          NEXT_PUBLIC_BASE_URL: 'https://example.com'

      - name: TypeScript coverage check
        id: ts-coverage
        continue-on-error: true
        run: |
          # Generate type coverage report
          npx type-coverage --at-least 90 2>&1 | tee type-coverage.txt || true
          COVERAGE=$(grep -oP '\d+\.\d+%' type-coverage.txt | head -1 || echo "0%")
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Post test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = "${{ steps.test.outcome }}" === 'success' ? '✅ Passed' : '⚠️ Failed';
            const tsCoverage = "${{ steps.ts-coverage.outputs.coverage }}" || "Unknown";

            const comment = `## 🧪 Test Quality Report

            ### Visual Regression Tests
            ${testResult}

            ### TypeScript Type Coverage
            ${tsCoverage}

            Run \`npm run test:visual\` locally to verify changes.`;

            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: comment,
              event: 'COMMENT'
            });

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Check test status
        if: steps.test.outcome == 'failure'
        run: |
          echo "❌ Tests failed - please review and fix before merging"
          exit 1
