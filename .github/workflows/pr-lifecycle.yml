name: PR Lifecycle Automation

# 2026-05-14 — mail-flood-stop v3: 단독 개발이라 stale PR 검사 의미 없음. 수동만.
on:
  workflow_dispatch:

jobs:
  auto-label:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply size labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const total = pr.additions + pr.deletions;
            let sizeLabel;

            if (total < 10) sizeLabel = 'size/XS';
            else if (total < 100) sizeLabel = 'size/S';
            else if (total < 500) sizeLabel = 'size/M';
            else if (total < 1000) sizeLabel = 'size/L';
            else sizeLabel = 'size/XL';

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [sizeLabel]
            });

            console.log(`Applied size label: ${sizeLabel} (${total} lines)`);

      - name: Detect change areas
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const areaLabels = new Set();
            const labelMap = {
              'src/app/api/': 'area/api',
              'src/app/admin/': 'area/admin',
              'src/app/m/': 'area/mobile',
              'src/lib/': 'area/lib',
              'src/components/': 'area/ui',
              'supabase/migrations/': 'area/database',
              'tests/': 'area/tests',
              'docs/': 'area/docs',
              '.github/': 'area/ci',
              'scripts/': 'area/scripts'
            };

            files.forEach(file => {
              Object.entries(labelMap).forEach(([prefix, label]) => {
                if (file.filename.startsWith(prefix)) {
                  areaLabels.add(label);
                }
              });
            });

            if (areaLabels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...areaLabels]
              });

              console.log(`Applied area labels: ${[...areaLabels].join(', ')}`);
            }

      - name: Detect commit type from title
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const typeMap = {
              'feat': 'type/feature',
              'fix': 'type/bugfix',
              'docs': 'type/docs',
              'refactor': 'type/refactor',
              'perf': 'type/performance',
              'test': 'type/tests',
              'chore': 'type/chore',
              'security': 'type/security'
            };

            const match = pr.title.match(/^(\w+)(?:\([^)]+\))?:/);
            if (match && typeMap[match[1]]) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [typeMap[match[1]]]
              });

              console.log(`Applied type label: ${typeMap[match[1]]}`);
            }

  conventional-commit-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const pattern = /^(feat|fix|docs|style|refactor|perf|test|chore|security|build|ci|revert)(\([^)]+\))?!?: .+/;

            if (!pattern.test(pr.title)) {
              const comment = `## ⚠️ Conventional Commit Format Required

PR title should follow [Conventional Commits](https://www.conventionalcommits.org/):

**Format:** \`<type>(<scope>)!: <subject>\`

**Valid types:**
- \`feat\` — new feature (minor version)
- \`fix\` — bug fix (patch version)
- \`docs\` — documentation only
- \`refactor\` — code restructure (no behavior change)
- \`perf\` — performance improvement
- \`test\` — adding tests
- \`chore\` — maintenance tasks
- \`security\` — security fix
- \`build\` — build system changes
- \`ci\` — CI/CD changes
- \`revert\` — revert previous commit

**Breaking changes:** add \`!\` after type/scope (\`feat!:\` or \`feat(api)!:\`)

**Examples:**
- ✅ \`feat(booking): add cancellation flow\`
- ✅ \`fix(payment): resolve race condition in match\`
- ✅ \`refactor!: rename customer_id to user_id\`
- ❌ \`Add new feature\` (no type)
- ❌ \`feature: do something\` (invalid type)

**Current title:** \`${pr.title}\`
`;

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });

              core.setFailed(`PR title does not follow conventional commits: ${pr.title}`);
            } else {
              console.log(`✅ PR title valid: ${pr.title}`);
            }

  stale-check:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Mark stale PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-message: |
            👋 This PR has been inactive for 14 days.

            If you're still working on this, please push new commits or comment.
            Otherwise, it will be closed in 7 days.
          close-pr-message: |
            🔒 Closing this PR due to 21 days of inactivity.

            Feel free to reopen if you want to continue working on it.
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,wip,blocked'
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-message: |
            👋 This issue has been inactive for 30 days.

            If still relevant, please comment with updates. Otherwise it will be closed.
          close-issue-message: |
            🔒 Closing this issue due to 44 days of inactivity.

            Feel free to reopen if it becomes relevant again.
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,wip,help-wanted'

  pr-metrics:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest

    steps:
      - name: Calculate PR metrics
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const metrics = {
              additions: pr.additions,
              deletions: pr.deletions,
              changed_files: pr.changed_files,
              new_files: files.filter(f => f.status === 'added').length,
              modified_files: files.filter(f => f.status === 'modified').length,
              deleted_files: files.filter(f => f.status === 'removed').length,
              test_files: files.filter(f => f.filename.match(/\.(spec|test)\.(ts|tsx)$/)).length,
              has_tests: files.some(f => f.filename.match(/\.(spec|test)\.(ts|tsx)$/))
            };

            const comment = `## 📊 PR Metrics

| Metric | Value |
|--------|-------|
| Files changed | ${metrics.changed_files} |
| Lines added | +${metrics.additions} |
| Lines removed | -${metrics.deletions} |
| New files | ${metrics.new_files} |
| Modified files | ${metrics.modified_files} |
| Deleted files | ${metrics.deleted_files} |
| Test files | ${metrics.test_files} |
| Has tests | ${metrics.has_tests ? '✅ Yes' : '⚠️ No'} |

${metrics.changed_files > 20 ? '⚠️ **Large PR**: Consider splitting into smaller, focused PRs for easier review.' : ''}
${!metrics.has_tests && metrics.additions > 50 ? '⚠️ **No tests added**: Consider adding test coverage for new code.' : ''}
`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

            console.log('Metrics posted');
