name: Supabase Type Generation

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-types.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-types.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate-types:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Supabase types
        id: gen
        continue-on-error: true
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_PROJECT_ID" ] || [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "⚠️ Supabase credentials not configured"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npx supabase gen types typescript --project-id $SUPABASE_PROJECT_ID > src/types/database.types.ts 2>&1
          echo "✅ Generated src/types/database.types.ts"
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Lint generated types
        if: steps.gen.outputs.generated == 'true'
        id: lint
        continue-on-error: true
        run: npx eslint src/types/database.types.ts --fix 2>&1 || true

      - name: Verify types compile
        if: steps.gen.outputs.generated == 'true'
        id: verify
        continue-on-error: true
        run: npx tsc src/types/database.types.ts --noEmit 2>&1 | head -5 || true

      - name: Create PR if changes
        if: steps.gen.outputs.generated == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore(db): regenerate Supabase types'
          title: 'chore: auto-regenerated Supabase database types'
          body: |
            Automatically generated Supabase types from schema migrations.

            **Generated:**
            - `src/types/database.types.ts`

            Please review and merge if the changes look correct.
          branch: supabase-types-update
          delete-branch: true
          labels: |
            dependencies
            auto-generated

      - name: Comment on failure
        if: steps.gen.outcome == 'failure' && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ Failed to generate Supabase types. Please check the workflow logs.`
            });
