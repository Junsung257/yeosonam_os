name: Test Coverage Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        timeout-minutes: 10

      - name: Run tests with coverage
        run: >
          npm run test -- --coverage --run
          --coverage.thresholds.lines=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.statements=0
          --coverage.thresholds.branches=0

      - name: Generate coverage badge
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const coveragePath = "coverage/coverage-summary.json";
            if (!fs.existsSync(coveragePath)) return;

            const summary = JSON.parse(fs.readFileSync(coveragePath, "utf8"));
            const global = summary.total;
            let body = "## Test Coverage Report\n\n";
            body += "| Metric | Coverage | Status |\n";
            body += "|--------|----------|--------|\n";

            const metrics = {
              lines: "Lines",
              statements: "Statements",
              functions: "Functions",
              branches: "Branches",
            };

            for (const [key, label] of Object.entries(metrics)) {
              const coverage = global[key]?.pct || 0;
              const status = coverage >= 80 ? "PASS" : coverage >= 70 ? "WARN" : "FAIL";
              body += `| ${label} | ${coverage.toFixed(2)}% | ${status} |\n`;
            }

            body += "\n**Threshold Status:**\n";
            body += `- Lines: ${global.lines?.pct >= 80 ? "PASS" : "FAIL"} (threshold: 80%)\n`;
            body += `- Statements: ${global.statements?.pct >= 80 ? "PASS" : "FAIL"} (threshold: 80%)\n`;
            body += `- Functions: ${global.functions?.pct >= 80 ? "PASS" : "FAIL"} (threshold: 80%)\n`;
            body += `- Branches: ${global.branches?.pct >= 75 ? "PASS" : "FAIL"} (threshold: 75%)\n`;

            if (context.eventName === "pull_request") {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body,
                event: "COMMENT",
              });
            }

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Comment PR if coverage job fails
        if: github.event_name == 'pull_request' && failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: "**Test coverage job failed**\n\nCoverage reporting could not complete. See the uploaded coverage report and job logs for details.",
              event: "COMMENT",
            });
