name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks first (type safety, linting)
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (high severity)
        run: npm audit --audit-level=high

      - name: Secret usage lint
        run: npm run lint:secrets:all

      - name: Sensitive API guard audit
        run: npm run audit:sensitive-api-guards

      - name: Marketing automation readiness
        run: npm run verify:marketing-automation:ci

      - name: TypeScript strict check
        run: npx tsc --strict --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: ESLint
        run: npm run lint

      - name: a11y lint (jsx-a11y strict)
        run: npx eslint src --no-eslintrc --config eslint-a11y.config.js --format=compact 2>&1 || true

      - name: Type coverage
        run: node scripts/check-type-coverage.js

  # Build & test
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # CI build env вҖ” dummy к°’ (мӢӨм ң fetch м•Ҳ н•Ё, supabase client constructor нҶөкіјмҡ©)
      # pr-quality-gate.yml кіј лҸҷмқј нҢЁн„ҙ (2026-05-15 л°•м ң). мӢӨ secrets лҠ” Vercel нҷҳкІҪм—җм„ңл§Ң л…ём¶ң.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
          SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
          NEXT_PUBLIC_BASE_URL: 'https://example.com'

      # Visual regression мқҖ dummy supabase env лқј мӢӨм ң лҚ°мқҙн„° fetch лӘ» н•Ё вҶ’ continue-on-error.
      # Vercel Preview нҷҳкІҪм—җм„ңлҠ” real secrets лқј м •мғҒ кІҖмҰқ. CI л№Ңл“ң нҶөкіјл§Ң ліҙмһҘ. (2026-05-15 л°•м ң)
      - name: Visual regression tests
        continue-on-error: true
        run: npx playwright install && npm run test:visual
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
          SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
          NEXT_PUBLIC_BASE_URL: 'https://example.com'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  # Performance checks (parallel)
  performance:
    name: Performance Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
          SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
          NEXT_PUBLIC_BASE_URL: 'https://example.com'

      - name: Start dev server
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
          SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
          NEXT_PUBLIC_BASE_URL: 'https://example.com'
        run: |
          npm run dev &
          for i in {1..60}; do
            curl -s http://localhost:3000 && exit 0
            sleep 1
          done
          exit 1

      - name: Lighthouse CI
        continue-on-error: true
        run: |
          npm install -g @lhci/cli@latest
          lhci autorun || true

      - name: Bundle analysis
        continue-on-error: true
        run: |
          SIZE=$(du -sh build/ | cut -f1)
          echo "Bundle size: $SIZE"

  # Security checks
  # 2026-05-15 вҖ” mail-flood-stop v4 кі м •:
  #   - codeql-action v2 deprecated вҶ’ v3
  #   - security-events: write к¶Ңн•ң лӘ…мӢң (SARIF м—…лЎңл“ң)
  #   - Trivy мҠӨмә”/м—…лЎңл“ң л‘ҳ лӢӨ continue-on-error вҖ” ліҙм•Ҳ мҠӨмә”мқҙ CI нҶөкіј мһҗмІҙлҘј л§үм§Җ м•ҠлҸ„лЎқ
  #     (status jobм—җм„ң quality/buildл§Ң к°Җл“ң. securityлҠ” м •ліҙм„ұ)
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload to GitHub Security
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # Final status check
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [quality, build, performance, security]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.quality.result }}" == "failure" ||
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "вқҢ CI failed"
            exit 1
          fi
          echo "вң… All critical checks passed"
