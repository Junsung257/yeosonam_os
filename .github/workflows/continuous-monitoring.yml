name: Continuous Monitoring & Health Checks

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  health-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Check API endpoint availability
        id: api-health
        run: node scripts/check-api-health.js || echo "API health check completed with warnings"
        env:
          MONITOR_BASE_URL: ${{ vars.MONITOR_BASE_URL || secrets.VERCEL_BASE_URL || 'https://www.yeosonam.com' }}

      - name: Monitor error rates
        id: error-monitoring
        run: node scripts/monitor-errors.js
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          ERROR_MONITOR_COUNTS: ${{ vars.ERROR_MONITOR_COUNTS }}

      - name: Check database connectivity and performance
        id: db-health
        run: node scripts/check-db-health.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Check third-party service status
        id: third-party
        run: node scripts/check-services.js
        env:
          SERVICE_STATUS_JSON: ${{ vars.SERVICE_STATUS_JSON }}

      - name: Generate availability report
        id: availability
        run: node scripts/generate-availability.js
        env:
          AVAILABILITY_UPTIME_JSON: ${{ vars.AVAILABILITY_UPTIME_JSON }}
          AVAILABILITY_SLO: ${{ vars.AVAILABILITY_SLO || '99.9' }}

      - name: Alert on critical issues
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Scheduled alert placeholder. Manual workflow runs do not send alerts.');

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-results
          path: |
            api-health-report.json
            error-monitoring-report.json
            db-health-report.json
            service-status-report.json
            availability-report.json
          retention-days: 90

  security-monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Check for exposed secrets
        run: node scripts/scan-secrets.js

      - name: Check dependencies for vulnerabilities
        run: npm audit --audit-level=moderate 2>&1 | head -50 || echo "Audit completed"

      - name: Verify security headers
        run: node scripts/verify-headers.js

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-monitoring-results
          path: |
            secret-scan-report.json
            security-headers-report.json
          retention-days: 90

  lighthouse-monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run Lighthouse score contract
        run: node scripts/lighthouse-check.js
        env:
          LIGHTHOUSE_SCORES_JSON: ${{ vars.LIGHTHOUSE_SCORES_JSON }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-monitoring-results
          path: lighthouse-report.json
          retention-days: 90
