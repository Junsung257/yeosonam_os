name: Cost & Resource Monitoring

on:
  workflow_dispatch:

jobs:
  cost-tracking:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Vercel usage check
        id: vercel
        continue-on-error: true
        run: node scripts/check-vercel-cost.js
        env:
          VERCEL_USAGE_JSON: ${{ vars.VERCEL_USAGE_JSON }}

      - name: Supabase usage check
        id: supabase
        continue-on-error: true
        run: node scripts/check-supabase-cost.js
        env:
          SUPABASE_USAGE_JSON: ${{ vars.SUPABASE_USAGE_JSON }}

      - name: AI API cost tracking
        id: ai-cost
        continue-on-error: true
        run: node scripts/check-ai-cost.js
        env:
          AI_COST_JSON: ${{ vars.AI_COST_JSON }}

      - name: Generate cost trend analysis
        if: always()
        run: node scripts/analyze-trends.js

      - name: Alert on cost overruns
        if: always()
        run: node scripts/check-alerts.js

      - name: Upload cost reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cost-monitoring-reports
          path: |
            vercel-cost.json
            supabase-cost.json
            ai-cost.json
            cost-trend-report.json
            cost-alerts.json
            .cost-history.jsonl
          retention-days: 90
