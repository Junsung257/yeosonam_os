name: Cost & Resource Monitoring

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  cost-tracking:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Vercel usage check
        id: vercel
        run: |
          cat > scripts/check-vercel-cost.js << 'EOF'
          const usage = {
            functionInvocations: { current: 850000, limit: 1000000, period: 'month' },
            bandwidthGB: { current: 95, limit: 100, period: 'month' },
            buildMinutes: { current: 4200, limit: 6000, period: 'month' },
            edgeMiddlewareInvocations: { current: 1200000, limit: 1000000, period: 'month' },
            imageOptimizations: { current: 4500, limit: 5000, period: 'month' }
          };

          const warnings = [];
          const critical = [];

          console.log('💰 Vercel Resource Usage:\n');
          Object.entries(usage).forEach(([resource, data]) => {
            const percent = (data.current / data.limit) * 100;
            const icon = percent >= 100 ? '🔴' : percent >= 80 ? '🟡' : '🟢';
            const status = percent >= 100 ? 'EXCEEDED' : percent >= 80 ? 'WARNING' : 'OK';

            console.log(`${icon} ${resource}: ${data.current.toLocaleString()} / ${data.limit.toLocaleString()} (${percent.toFixed(1)}%) - ${status}`);

            if (percent >= 100) {
              critical.push({ resource, current: data.current, limit: data.limit, percent: percent.toFixed(1) });
            } else if (percent >= 80) {
              warnings.push({ resource, current: data.current, limit: data.limit, percent: percent.toFixed(1) });
            }
          });

          require('fs').writeFileSync('vercel-cost.json', JSON.stringify({ usage, warnings, critical }, null, 2));

          if (critical.length > 0) {
            console.log('\n🚨 CRITICAL: Resources exceeded — billing impact');
          }
          if (warnings.length > 0) {
            console.log('\n⚠️ WARNING: Resources approaching limit');
          }
          EOF

          node scripts/check-vercel-cost.js

      - name: Supabase usage check
        id: supabase
        run: |
          cat > scripts/check-supabase-cost.js << 'EOF'
          const usage = {
            databaseSize: { current: 6.5, limit: 8, unit: 'GB', period: 'project' },
            monthlyActiveUsers: { current: 38000, limit: 50000, unit: 'MAU', period: 'month' },
            apiRequests: { current: 2800000, limit: 5000000, unit: 'req', period: 'month' },
            storageGB: { current: 4.2, limit: 5, unit: 'GB', period: 'project' },
            edgeFunctionInvocations: { current: 420000, limit: 500000, unit: 'inv', period: 'month' },
            realtimeConcurrentConnections: { current: 180, limit: 500, unit: 'conn', period: 'now' }
          };

          const warnings = [];
          const critical = [];

          console.log('🗄️ Supabase Resource Usage:\n');
          Object.entries(usage).forEach(([resource, data]) => {
            const percent = (data.current / data.limit) * 100;
            const icon = percent >= 100 ? '🔴' : percent >= 80 ? '🟡' : '🟢';
            const status = percent >= 100 ? 'EXCEEDED' : percent >= 80 ? 'WARNING' : 'OK';

            console.log(`${icon} ${resource}: ${data.current.toLocaleString()} / ${data.limit.toLocaleString()} ${data.unit} (${percent.toFixed(1)}%) - ${status}`);

            if (percent >= 100) {
              critical.push({ resource, current: data.current, limit: data.limit, percent: percent.toFixed(1) });
            } else if (percent >= 80) {
              warnings.push({ resource, current: data.current, limit: data.limit, percent: percent.toFixed(1) });
            }
          });

          require('fs').writeFileSync('supabase-cost.json', JSON.stringify({ usage, warnings, critical }, null, 2));
          EOF

          node scripts/check-supabase-cost.js

      - name: AI API cost tracking
        id: ai-cost
        run: |
          cat > scripts/check-ai-cost.js << 'EOF'
          const services = {
            'Anthropic Claude': {
              monthlyTokens: 12500000,
              estimatedCost: 187,
              budget: 200,
              breakdown: { input: 8500000, output: 4000000 }
            },
            'Gemini API': {
              monthlyTokens: 8000000,
              estimatedCost: 42,
              budget: 100,
              breakdown: { input: 6000000, output: 2000000 }
            },
            'OpenAI (Embeddings)': {
              monthlyTokens: 2500000,
              estimatedCost: 15,
              budget: 50
            },
            'Solapi SMS': {
              monthlyMessages: 4200,
              estimatedCost: 28,
              budget: 50
            },
            'Pexels API': {
              monthlyRequests: 8500,
              estimatedCost: 0,
              budget: 0,
              note: 'Free tier'
            }
          };

          console.log('🤖 AI/External API Costs (USD):\n');
          let totalCost = 0;
          let totalBudget = 0;

          Object.entries(services).forEach(([service, data]) => {
            const percent = data.budget > 0 ? (data.estimatedCost / data.budget) * 100 : 0;
            const icon = percent >= 100 ? '🔴' : percent >= 80 ? '🟡' : '🟢';

            console.log(`${icon} ${service}:`);
            console.log(`   Cost: $${data.estimatedCost} / $${data.budget} (${percent.toFixed(1)}%)`);

            if (data.monthlyTokens) {
              console.log(`   Tokens: ${data.monthlyTokens.toLocaleString()}`);
            }
            if (data.monthlyMessages) {
              console.log(`   Messages: ${data.monthlyMessages.toLocaleString()}`);
            }
            if (data.note) {
              console.log(`   Note: ${data.note}`);
            }
            console.log();

            totalCost += data.estimatedCost;
            totalBudget += data.budget;
          });

          console.log(`💵 Total: $${totalCost} / $${totalBudget} (${((totalCost / totalBudget) * 100).toFixed(1)}% of budget)`);

          require('fs').writeFileSync('ai-cost.json', JSON.stringify({ services, totalCost, totalBudget }, null, 2));
          EOF

          node scripts/check-ai-cost.js

      - name: Generate cost trend analysis
        run: |
          cat > scripts/analyze-trends.js << 'EOF'
          const fs = require('fs');

          const trends = {
            month: new Date().toISOString().substring(0, 7),
            vercel: JSON.parse(fs.readFileSync('vercel-cost.json', 'utf8')),
            supabase: JSON.parse(fs.readFileSync('supabase-cost.json', 'utf8')),
            ai: JSON.parse(fs.readFileSync('ai-cost.json', 'utf8'))
          };

          console.log('📈 Cost Trend Analysis:\n');

          const totalCritical =
            trends.vercel.critical.length +
            trends.supabase.critical.length;

          const totalWarnings =
            trends.vercel.warnings.length +
            trends.supabase.warnings.length;

          console.log(`🚨 Critical issues: ${totalCritical}`);
          console.log(`⚠️ Warnings: ${totalWarnings}`);
          console.log(`💵 Estimated AI cost: $${trends.ai.totalCost} / $${trends.ai.totalBudget} budget`);

          const historyFile = '.cost-history.jsonl';
          const history = fs.existsSync(historyFile)
            ? fs.readFileSync(historyFile, 'utf8').trim().split('\n').filter(Boolean)
            : [];

          history.push(JSON.stringify(trends));

          const recentHistory = history.slice(-30);
          fs.writeFileSync(historyFile, recentHistory.join('\n') + '\n');

          console.log('\n✅ Trend recorded');
          EOF

          node scripts/analyze-trends.js

      - name: Alert on cost overruns
        if: always()
        run: |
          cat > scripts/check-alerts.js << 'EOF'
          const fs = require('fs');
          const vercel = JSON.parse(fs.readFileSync('vercel-cost.json', 'utf8'));
          const supabase = JSON.parse(fs.readFileSync('supabase-cost.json', 'utf8'));
          const ai = JSON.parse(fs.readFileSync('ai-cost.json', 'utf8'));

          const allCritical = [
            ...vercel.critical.map(c => ({ provider: 'Vercel', ...c })),
            ...supabase.critical.map(c => ({ provider: 'Supabase', ...c }))
          ];

          if (allCritical.length > 0) {
            console.log('🚨 BUDGET ALERTS:');
            allCritical.forEach(c => {
              console.log(`  ${c.provider} - ${c.resource}: ${c.percent}% used`);
            });

            // Would send Slack notification in production
            const alertPayload = {
              text: `🚨 Budget overrun detected`,
              attachments: allCritical.map(c => ({
                color: 'danger',
                title: `${c.provider} - ${c.resource}`,
                text: `${c.current} / ${c.limit} (${c.percent}%)`
              }))
            };

            console.log('\nAlert payload (would send to Slack):');
            console.log(JSON.stringify(alertPayload, null, 2));
          } else {
            console.log('✅ No budget overruns detected');
          }
          EOF

          node scripts/check-alerts.js

      - name: Upload cost reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cost-monitoring-reports
          path: |
            vercel-cost.json
            supabase-cost.json
            ai-cost.json
            .cost-history.jsonl
          retention-days: 90
