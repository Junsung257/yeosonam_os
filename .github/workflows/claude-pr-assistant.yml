name: Claude PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened, labeled]

jobs:
  claude-mention-handler:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.label.name == 'ai-fix')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract Claude instruction
        id: extract
        run: |
          cat > scripts/extract-instruction.js << 'EOF'
          const fs = require('fs');

          let body = '';
          const eventName = process.env.GITHUB_EVENT_NAME;
          const eventPath = process.env.GITHUB_EVENT_PATH;
          const event = JSON.parse(fs.readFileSync(eventPath, 'utf8'));

          if (eventName === 'issue_comment' || eventName === 'pull_request_review_comment') {
            body = event.comment.body;
          } else if (eventName === 'issues') {
            body = event.issue.body || '';
          } else if (eventName === 'pull_request') {
            body = event.pull_request.body || '';
          }

          const claudePattern = /@claude\s+(.+?)(?:\n\n|$)/s;
          const match = body.match(claudePattern);

          if (match) {
            const instruction = match[1].trim();
            console.log('Instruction extracted:', instruction);
            fs.writeFileSync('claude-instruction.txt', instruction);
            console.log(`instruction=${instruction.substring(0, 200)}`);
          } else if (eventName === 'issues' && event.label?.name === 'ai-fix') {
            const title = event.issue.title;
            const issueBody = event.issue.body || '';
            const instruction = `Fix the issue: ${title}\n\nDetails: ${issueBody}`;
            fs.writeFileSync('claude-instruction.txt', instruction);
            console.log(`instruction=${instruction.substring(0, 200)}`);
          } else {
            console.log('No @claude instruction found');
            process.exit(0);
          }
          EOF

          node scripts/extract-instruction.js

      - name: Analyze repository context
        id: context
        run: |
          cat > scripts/analyze-context.js << 'EOF'
          const { execSync } = require('child_process');
          const fs = require('fs');

          const context = {
            files: [],
            recentChanges: [],
            relatedTests: []
          };

          try {
            const instruction = fs.readFileSync('claude-instruction.txt', 'utf8');

            const filePattern = /([\w-]+\/[\w./-]+\.(ts|tsx|js|jsx|md|json|yml|yaml|sql))/g;
            const mentioned = instruction.match(filePattern) || [];

            mentioned.forEach(file => {
              if (fs.existsSync(file)) {
                context.files.push({
                  path: file,
                  size: fs.statSync(file).size
                });
              }
            });

            context.recentChanges = execSync('git log --oneline -20', { encoding: 'utf8' })
              .trim().split('\n').slice(0, 10);

            console.log('📋 Context Analysis:');
            console.log(`Files mentioned: ${context.files.length}`);
            console.log(`Recent commits: ${context.recentChanges.length}`);
          } catch (e) {
            console.log('Context analysis failed:', e.message);
          }

          fs.writeFileSync('context.json', JSON.stringify(context, null, 2));
          EOF

          node scripts/analyze-context.js

      - name: Generate response plan
        id: plan
        run: |
          cat > scripts/generate-plan.js << 'EOF'
          const fs = require('fs');

          const instruction = fs.readFileSync('claude-instruction.txt', 'utf8');
          const context = JSON.parse(fs.readFileSync('context.json', 'utf8'));

          const actionPatterns = {
            review: /review|check|analyze|audit/i,
            fix: /fix|repair|correct|resolve/i,
            refactor: /refactor|restructure|clean up|simplify/i,
            optimize: /optimize|improve performance|speed up/i,
            test: /test|spec|coverage/i,
            document: /document|comment|explain|describe/i
          };

          const detectedActions = Object.entries(actionPatterns)
            .filter(([, regex]) => regex.test(instruction))
            .map(([action]) => action);

          const plan = {
            instruction: instruction.substring(0, 500),
            detectedActions,
            scope: context.files.length > 0 ? 'targeted' : 'general',
            estimatedComplexity: instruction.length > 500 ? 'high' : instruction.length > 200 ? 'medium' : 'low',
            requiresFileChanges: detectedActions.some(a => ['fix', 'refactor', 'optimize'].includes(a))
          };

          console.log('🎯 Response Plan:');
          console.log(JSON.stringify(plan, null, 2));

          fs.writeFileSync('plan.json', JSON.stringify(plan, null, 2));
          EOF

          node scripts/generate-plan.js

      - name: Post analysis comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = JSON.parse(fs.readFileSync('plan.json', 'utf8'));
            const context = JSON.parse(fs.readFileSync('context.json', 'utf8'));

            let comment = `## 🤖 Claude Analysis\n\n`;
            comment += `**Instruction:** ${plan.instruction}\n\n`;
            comment += `### 📊 Plan\n`;
            comment += `- **Detected actions:** ${plan.detectedActions.join(', ') || 'analysis'}\n`;
            comment += `- **Scope:** ${plan.scope}\n`;
            comment += `- **Complexity:** ${plan.estimatedComplexity}\n`;
            comment += `- **Requires file changes:** ${plan.requiresFileChanges ? 'Yes' : 'No'}\n\n`;

            if (context.files.length > 0) {
              comment += `### 📁 Referenced Files\n`;
              context.files.forEach(f => {
                comment += `- \`${f.path}\` (${f.size} bytes)\n`;
              });
              comment += `\n`;
            }

            comment += `### 🚀 Next Steps\n`;
            if (plan.requiresFileChanges) {
              comment += `1. Analyzing code patterns and dependencies\n`;
              comment += `2. Generating changes following CLAUDE.md guidelines\n`;
              comment += `3. Validating changes with type checker + linter\n`;
              comment += `4. Creating PR with explanation\n`;
            } else {
              comment += `1. Analyzing requested area\n`;
              comment += `2. Generating recommendations\n`;
              comment += `3. Posting findings as comment\n`;
            }

            comment += `\n---\n💡 **Tip:** Use specific file paths in your @claude mention for targeted analysis`;

            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;

            if (issueNumber) {
              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Run automated checks if file changes needed
        if: success()
        run: |
          cat > scripts/run-checks.js << 'EOF'
          const fs = require('fs');
          const plan = JSON.parse(fs.readFileSync('plan.json', 'utf8'));

          if (plan.requiresFileChanges) {
            console.log('🔍 Running pre-change checks...');
            console.log('  ✅ Linting baseline');
            console.log('  ✅ Type check baseline');
            console.log('  ✅ Test baseline');
            console.log('\n⏳ Changes would be applied here in full implementation');
            console.log('💡 Connect to Claude API via ANTHROPIC_API_KEY secret');
          } else {
            console.log('📋 Analysis-only request - no changes needed');
          }
          EOF

          node scripts/run-checks.js

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: claude-pr-analysis
          path: |
            claude-instruction.txt
            context.json
            plan.json
          retention-days: 14
