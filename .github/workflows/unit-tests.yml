name: Unit Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        id: test
        run: npm run test:unit

      - name: Generate coverage report
        if: always() && steps.test.outcome == 'success'
        continue-on-error: true
        run: >
          npm run test:unit -- --coverage
          --coverage.thresholds.lines=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.statements=0
          --coverage.reporter=json
          --coverage.reporter=json-summary
          --coverage.reporter=lcov

      - name: Upload coverage
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Post coverage report
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            let body = "## Unit Test Coverage\n\n";

            try {
              const coverage = JSON.parse(fs.readFileSync("coverage/coverage-final.json", "utf8"));
              const totals = coverage.total || {};

              body += "| Metric | Coverage |\n";
              body += "|--------|----------|\n";
              body += `| Lines | ${totals.lines?.pct || "N/A"}% |\n`;
              body += `| Statements | ${totals.statements?.pct || "N/A"}% |\n`;
              body += `| Functions | ${totals.functions?.pct || "N/A"}% |\n`;
              body += `| Branches | ${totals.branches?.pct || "N/A"}% |\n`;
            } catch {
              body += "Coverage report not available\n";
            }

            body += "${{ steps.test.outcome }}" === "success"
              ? "\nAll tests passed"
              : "\nTests failed - see logs";

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body,
              event: "COMMENT",
            });

      - name: Check coverage threshold
        if: steps.test.outcome == 'failure'
        run: |
          echo "Unit tests failed or coverage below threshold"
          exit 1
