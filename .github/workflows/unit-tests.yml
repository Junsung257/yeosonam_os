name: Unit Tests

# 2026-05-13 — mail-flood-stop v2: PR Quality Gate의 TypeScript+Vitest와 중복. 수동만.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: test
        run: npm run test:unit

      - name: Generate coverage report
        if: always() && steps.test.outcome == 'success'
        continue-on-error: true
        run: >
          npm run test:unit -- --coverage
          --coverage.thresholds.lines=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.statements=0
          --coverage.reporter=json
          --coverage.reporter=json-summary
          --coverage.reporter=lcov

      - name: Upload coverage
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Post coverage report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = `## 🧪 Unit Test Coverage\n\n`;

            try {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
              const totals = coverage.total || {};

              comment += `| Metric | Coverage |\n`;
              comment += `|--------|----------|\n`;
              comment += `| Lines | ${totals.lines?.pct || 'N/A'}% |\n`;
              comment += `| Statements | ${totals.statements?.pct || 'N/A'}% |\n`;
              comment += `| Functions | ${totals.functions?.pct || 'N/A'}% |\n`;
              comment += `| Branches | ${totals.branches?.pct || 'N/A'}% |\n`;
            } catch (err) {
              comment += `Coverage report not available\n`;
            }

            if ("${{ steps.test.outcome }}" === "success") {
              comment += `\n✅ All tests passed`;
            } else {
              comment += `\n❌ Tests failed - see logs`;
            }

            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: comment,
              event: 'COMMENT'
            });

      - name: Check coverage threshold
        if: steps.test.outcome == 'failure'
        run: |
          echo "❌ Unit tests failed or coverage below threshold"
          exit 1
